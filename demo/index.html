<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>noise-wave-flow · local dev</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07070f;
      --text: #e8e8f0;
      --muted: #7777aa;
      --accent: #6366f1;
      --border: rgba(255,255,255,0.07);
      --code-bg: rgba(255,255,255,0.05);
      --panel-bg: rgba(10,10,20,0.92);
    }

    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased; }

    #hero {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    .dev-badge {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #f59e0b;
      border: 1px solid rgba(245,158,11,0.4);
      border-radius: 999px;
      padding: 0.2rem 0.7rem;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.05;
      margin-bottom: 0.75rem;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--muted);
    }

    /* ── Customizer panel ──────────────────────────────────── */
    #customizer-toggle {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 100;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(99,102,241,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #customizer-toggle:hover {
      transform: scale(1.08);
      box-shadow: 0 4px 28px rgba(99,102,241,0.6);
    }

    #customizer {
      position: fixed;
      bottom: 5rem;
      right: 1.5rem;
      z-index: 99;
      width: 280px;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      display: none;
      flex-direction: column;
      gap: 0.9rem;
      max-height: calc(100vh - 7rem);
      overflow-y: auto;
    }

    #customizer.open { display: flex; }

    .panel-title {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .ctrl { display: flex; flex-direction: column; gap: 0.3rem; }
    .ctrl-row { display: flex; align-items: center; justify-content: space-between; }
    .ctrl label { font-size: 0.78rem; color: var(--muted); font-family: 'SF Mono', 'Fira Code', monospace; }
    .ctrl-val { font-size: 0.75rem; color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace; min-width: 2.5rem; text-align: right; }

    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 3px;
      background: rgba(255,255,255,0.1); border-radius: 2px;
      outline: none; cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px; border-radius: 50%;
      background: var(--accent); cursor: pointer; transition: transform 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }

    input[type="color"] {
      -webkit-appearance: none; appearance: none;
      width: 32px; height: 22px;
      border: 1px solid var(--border); border-radius: 5px;
      background: none; cursor: pointer; padding: 1px;
    }

    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }

    .toggle-row { display: flex; align-items: center; justify-content: space-between; }
    .toggle-label { font-size: 0.78rem; color: var(--muted); font-family: 'SF Mono', 'Fira Code', monospace; }

    .toggle { position: relative; width: 34px; height: 18px; cursor: pointer; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track { position: absolute; inset: 0; background: rgba(255,255,255,0.1); border-radius: 999px; transition: background 0.2s; }
    .toggle input:checked + .toggle-track { background: var(--accent); }
    .toggle-thumb { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

    .panel-reset {
      font-size: 0.72rem; color: var(--muted);
      background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: 0.35rem 0.75rem;
      cursor: pointer; align-self: flex-start;
      transition: color 0.2s, border-color 0.2s; font-family: inherit;
    }

    .panel-reset:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

<section id="hero">
  <div class="hero-content">
    <span class="dev-badge">local dev</span>
    <h1>noise-wave-flow</h1>
    <p class="subtitle">Move your mouse · Scroll the page · Tweak ⚙ settings</p>
  </div>
</section>

<!-- ── Customizer ──────────────────────────────────────────────── -->
<button id="customizer-toggle" title="Customize" onclick="togglePanel()">⚙</button>

<div id="customizer">
  <div class="panel-title">Live Customize</div>

  <div class="ctrl">
    <div class="ctrl-row">
      <label>color</label>
      <input type="color" id="ctrl-color" value="#ffffff" oninput="onColor(this.value)" />
    </div>
  </div>

  <div class="ctrl">
    <div class="ctrl-row"><label>alpha</label><span class="ctrl-val" id="val-alpha">0.3</span></div>
    <input type="range" id="ctrl-alpha" min="0" max="1" step="0.01" value="0.3"
      oninput="onRange('alpha', this.value, 'val-alpha')" />
  </div>

  <div class="ctrl">
    <div class="ctrl-row"><label>spacing</label><span class="ctrl-val" id="val-spacing">28</span></div>
    <input type="range" id="ctrl-spacing" min="8" max="80" step="1" value="28"
      oninput="onRange('spacing', this.value, 'val-spacing')" />
  </div>

  <div class="ctrl">
    <div class="ctrl-row"><label>steps</label><span class="ctrl-val" id="val-steps">5</span></div>
    <input type="range" id="ctrl-steps" min="1" max="20" step="1" value="5"
      oninput="onRange('steps', this.value, 'val-steps')" />
  </div>

  <div class="ctrl">
    <div class="ctrl-row"><label>stepLen</label><span class="ctrl-val" id="val-stepLen">8</span></div>
    <input type="range" id="ctrl-stepLen" min="1" max="30" step="0.5" value="8"
      oninput="onRange('stepLen', this.value, 'val-stepLen')" />
  </div>

  <div class="ctrl">
    <div class="ctrl-row"><label>idleStep</label><span class="ctrl-val" id="val-idleStep">2.5</span></div>
    <input type="range" id="ctrl-idleStep" min="0.5" max="10" step="0.5" value="2.5"
      oninput="onRange('idleStep', this.value, 'val-idleStep')" />
  </div>

  <div class="ctrl">
    <div class="ctrl-row"><label>windRadius</label><span class="ctrl-val" id="val-windRadius">200</span></div>
    <input type="range" id="ctrl-windRadius" min="50" max="600" step="10" value="200"
      oninput="onRange('windRadius', this.value, 'val-windRadius')" />
  </div>

  <div class="ctrl">
    <div class="ctrl-row"><label>mouseLerp</label><span class="ctrl-val" id="val-mouseLerp">0.07</span></div>
    <input type="range" id="ctrl-mouseLerp" min="0.01" max="1" step="0.01" value="0.07"
      oninput="onRange('mouseLerp', this.value, 'val-mouseLerp')" />
  </div>

  <div class="ctrl">
    <div class="ctrl-row"><label>windLerp</label><span class="ctrl-val" id="val-windLerp">0.18</span></div>
    <input type="range" id="ctrl-windLerp" min="0.01" max="1" step="0.01" value="0.18"
      oninput="onRange('windLerp', this.value, 'val-windLerp')" />
  </div>

  <div class="ctrl">
    <div class="ctrl-row"><label>intensityLerp</label><span class="ctrl-val" id="val-intensityLerp">0.055</span></div>
    <input type="range" id="ctrl-intensityLerp" min="0.005" max="0.3" step="0.005" value="0.055"
      oninput="onRange('intensityLerp', this.value, 'val-intensityLerp')" />
  </div>

  <div class="toggle-row">
    <span class="toggle-label">trackMouse</span>
    <label class="toggle">
      <input type="checkbox" id="ctrl-trackMouse" checked onchange="onToggle('trackMouse', this.checked)" />
      <span class="toggle-track"></span><span class="toggle-thumb"></span>
    </label>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">trackScroll</span>
    <label class="toggle">
      <input type="checkbox" id="ctrl-trackScroll" checked onchange="onToggle('trackScroll', this.checked)" />
      <span class="toggle-track"></span><span class="toggle-thumb"></span>
    </label>
  </div>

  <button class="panel-reset" onclick="resetDefaults()">Reset defaults</button>
</div>

<script type="module">
  import { mountNoiseFlow } from '../src/index.js';

  const flow = mountNoiseFlow(document.getElementById('hero'));
  window._flow = flow;
</script>

<script>
  function togglePanel() {
    document.getElementById('customizer').classList.toggle('open');
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `${r},${g},${b}`;
  }

  function onRange(key, value, valId) {
    document.getElementById(valId).textContent = parseFloat(value);
    window._flow?.update({ [key]: parseFloat(value) });
  }

  function onColor(hex) {
    window._flow?.update({ color: hexToRgb(hex) });
  }

  function onToggle(key, checked) {
    window._flow?.update({ [key]: checked });
  }

  const DEFAULTS = {
    color: '#ffffff', alpha: 0.3, spacing: 28, steps: 5,
    stepLen: 8, idleStep: 2.5, windRadius: 200,
    mouseLerp: 0.07, windLerp: 0.18, intensityLerp: 0.055,
    trackMouse: true, trackScroll: true,
  };

  function resetDefaults() {
    document.getElementById('ctrl-color').value          = DEFAULTS.color;
    document.getElementById('ctrl-alpha').value          = DEFAULTS.alpha;
    document.getElementById('ctrl-spacing').value        = DEFAULTS.spacing;
    document.getElementById('ctrl-steps').value          = DEFAULTS.steps;
    document.getElementById('ctrl-stepLen').value        = DEFAULTS.stepLen;
    document.getElementById('ctrl-idleStep').value       = DEFAULTS.idleStep;
    document.getElementById('ctrl-windRadius').value     = DEFAULTS.windRadius;
    document.getElementById('ctrl-mouseLerp').value      = DEFAULTS.mouseLerp;
    document.getElementById('ctrl-windLerp').value       = DEFAULTS.windLerp;
    document.getElementById('ctrl-intensityLerp').value  = DEFAULTS.intensityLerp;
    document.getElementById('ctrl-trackMouse').checked   = DEFAULTS.trackMouse;
    document.getElementById('ctrl-trackScroll').checked  = DEFAULTS.trackScroll;

    document.getElementById('val-alpha').textContent         = DEFAULTS.alpha;
    document.getElementById('val-spacing').textContent       = DEFAULTS.spacing;
    document.getElementById('val-steps').textContent         = DEFAULTS.steps;
    document.getElementById('val-stepLen').textContent       = DEFAULTS.stepLen;
    document.getElementById('val-idleStep').textContent      = DEFAULTS.idleStep;
    document.getElementById('val-windRadius').textContent    = DEFAULTS.windRadius;
    document.getElementById('val-mouseLerp').textContent     = DEFAULTS.mouseLerp;
    document.getElementById('val-windLerp').textContent      = DEFAULTS.windLerp;
    document.getElementById('val-intensityLerp').textContent = DEFAULTS.intensityLerp;

    window._flow?.update({ ...DEFAULTS, color: hexToRgb(DEFAULTS.color) });
  }
</script>

</body>
</html>
